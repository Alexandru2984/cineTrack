name: cinetrack-dev

services:
  db:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 512
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app:ro
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - backend_target:/app/target

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    env_file: .env
    ports:
      - "127.0.0.1:5173:5173"
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    volumes:
      - ./frontend:/app:ro
      - node_modules:/app/node_modules

  adminer:
    image: adminer:5-standalone@sha256:983261ecc40a4aaf11e25aeda8ef821f5a43a9f024b3967c81cbcc0e6ce43ba3
    profiles:
      - tools
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - db

volumes:
  postgres_data:
  cargo_cache:
  cargo_git:
  backend_target:
  node_modules:
