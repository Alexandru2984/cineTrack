name: cinetrack

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
          pids: 256

  backend:
    image: cinetrack-backend
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      APP_ENV: production
      APP_HOST: "${APP_HOST:-0.0.0.0}"
      APP_PORT: "${APP_PORT:-8080}"
      FRONTEND_URL: "${FRONTEND_URL}"
      DATABASE_URL: "postgresql://${APP_DATABASE_USER:-cinetrack_app}:${APP_DATABASE_PASSWORD:-provision-runtime-role-first}@db:5432/${POSTGRES_DB}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRY_MINUTES: "${JWT_EXPIRY_MINUTES:-15}"
      JWT_REFRESH_EXPIRY_DAYS: "${JWT_REFRESH_EXPIRY_DAYS:-30}"
      TMDB_API_KEY: "${TMDB_API_KEY}"
      TMDB_READ_ACCESS_TOKEN: "${TMDB_READ_ACCESS_TOKEN:-}"
      TMDB_BASE_URL: "${TMDB_BASE_URL:-https://api.themoviedb.org/3}"
      TMDB_IMAGE_BASE_URL: "${TMDB_IMAGE_BASE_URL:-https://image.tmdb.org/t/p}"
      TMDB_TIMEOUT_SECONDS: "${TMDB_TIMEOUT_SECONDS:-10}"
      CATALOG_HYDRATION_DAILY_BUDGET: "${CATALOG_HYDRATION_DAILY_BUDGET:-200}"
      CATALOG_HYDRATION_DELAY_MS: "${CATALOG_HYDRATION_DELAY_MS:-250}"
      RELEASE_SCHEDULE_SYNC_BUDGET: "${RELEASE_SCHEDULE_SYNC_BUDGET:-200}"
      RELEASE_SCHEDULE_SYNC_DELAY_MS: "${RELEASE_SCHEDULE_SYNC_DELAY_MS:-250}"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS}"
      RATE_LIMIT_REQUESTS_PER_SECOND: "${RATE_LIMIT_REQUESTS_PER_SECOND:-10}"
      RATE_LIMIT_BURST_SIZE: "${RATE_LIMIT_BURST_SIZE:-50}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USERNAME: "${SMTP_USERNAME:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-CineTrack <noreply@localhost>}"
      SMTP_TIMEOUT_SECONDS: "${SMTP_TIMEOUT_SECONDS:-15}"
      R2_S3_API: "${R2_S3_API:-}"
      R2_ENDPOINT: "${R2_ENDPOINT:-}"
      R2_ACCESS_KEY_ID: "${R2_ACCESS_KEY_ID:-}"
      R2_SECRET_ACCESS_KEY: "${R2_SECRET_ACCESS_KEY:-}"
      R2_BUCKET: "${R2_BUCKET:-}"
      R2_PUBLIC_BASE_URL: "${R2_PUBLIC_BASE_URL:-}"
      RUST_LOG: "${RUST_LOG:-cinetrack=info,actix_web=info}"
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/cinetrack", "--healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 256

  migrate:
    profiles: ["ops"]
    image: cinetrack-backend
    command: ["/usr/local/bin/cinetrack", "--migrate"]
    environment:
      DATABASE_URL: "postgresql://${MIGRATION_DATABASE_USER:-cinetrack_migrator}:${MIGRATION_DATABASE_PASSWORD:-provision-migration-role-first}@db:5432/${POSTGRES_DB}"
      RUST_LOG: "${RUST_LOG:-cinetrack=info}"
    read_only: true
    tmpfs:
      - /tmp:size=32m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    init: true
    restart: "no"
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_USE_R2_IMAGES: "${VITE_USE_R2_IMAGES:-false}"
    read_only: true
    tmpfs:
      # Writable by the non-root nginx user (uid 101); the tmpfs overlays the
      # image dirs, so it must be created writable or nginx can't make its
      # client_temp/pid on startup.
      - /var/cache/nginx:size=32m,noexec,nosuid,nodev,uid=101,gid=101
      - /var/run:size=8m,noexec,nosuid,nodev,uid=101,gid=101
      - /tmp:size=32m,noexec,nosuid,nodev,uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    logging: *default-logging
    ports:
      - "127.0.0.1:8091:8080"
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
          pids: 128

networks:
  frontend:

volumes:
  postgres_data:
