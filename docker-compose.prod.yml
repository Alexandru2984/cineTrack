x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  db:
    image: postgres:16-alpine
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.0"
          pids: 256

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    environment:
      RUST_LOG: ${RUST_LOG:-cinetrack=info,actix_web=info}
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8090:8080"
    healthcheck:
      test: ["CMD", "/usr/local/bin/cinetrack", "--healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 256

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
    read_only: true
    tmpfs:
      # Writable by the non-root nginx user (uid 101); the tmpfs overlays the
      # image dirs, so it must be created writable or nginx can't make its
      # client_temp/pid on startup.
      - /var/cache/nginx:size=32m,noexec,nosuid,nodev,uid=101,gid=101
      - /var/run:size=8m,noexec,nosuid,nodev,uid=101,gid=101
      - /tmp:size=32m,noexec,nosuid,nodev,uid=101,gid=101
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    init: true
    restart: unless-stopped
    stop_grace_period: 15s
    logging: *default-logging
    ports:
      - "127.0.0.1:8091:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
          pids: 128

volumes:
  postgres_data:
