name: cinetrack-test

services:
  test-db:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: cinetrack_test
    ports:
      - "127.0.0.1:${TEST_DB_PORT:-55433}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d cinetrack_test"]
      interval: 2s
      timeout: 5s
      retries: 10
