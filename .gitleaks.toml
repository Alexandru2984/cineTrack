# Gitleaks configuration for CineTrack.
#
# Extends the upstream default ruleset and adds a narrow allowlist for the
# throwaway passwords used by the end-to-end suites. These are not real
# credentials: every E2E account is registered against an ephemeral test
# database and discarded once the run finishes, so the literals are test
# fixtures rather than secrets. The allowlist is scoped to the exact spec files
# and the exact fixture values so a genuine leak elsewhere is still caught.
[extend]
useDefault = true

[[allowlists]]
description = "Throwaway E2E test-fixture passwords (ephemeral test DB, not real credentials)"
condition = "AND"
paths = [
  '''frontend/e2e/auth\.spec\.ts''',
  '''frontend/e2e-realstack/auth-flows\.spec\.ts''',
]
regexes = [
  '''(?:New)?Passw0rd\d{3}''',
]

[[allowlists]]
description = "Fake recovery-code fixtures in the mobile two-factor login test. These are dummy grouped-hex strings used to prove a non-6-digit code takes the recovery path; the current fixture is low entropy, and this covers the earlier commit in the full-history scan."
condition = "AND"
paths = [
  '''mobile/src/lib/__tests__/two-factor-login-test\.ts''',
]
regexes = [
  '''[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}''',
]

[[allowlists]]
description = "RFC 6238 TOTP reference test vector (published in the standard, not a real secret). Current code computes it; this covers older commits in the full-history scan."
condition = "AND"
paths = [
  '''backend/src/utils/totp\.rs''',
]
regexes = [
  '''GEZDGNBVGY3TQOJQ''',
]
