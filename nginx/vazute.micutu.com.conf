limit_req_zone $binary_remote_addr zone=vazute_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=vazute_auth:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=vazute_import:10m rate=2r/m;
limit_req_zone $binary_remote_addr zone=vazute_assets:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=vazute_search:10m rate=2r/s;
limit_conn_zone $binary_remote_addr zone=vazute_api_conn:10m;

server {
    include snippets/block-dotfiles.conf;
    server_name vazute.micutu.com;

    server_tokens off;
    client_max_body_size 64k;
    client_header_timeout 10s;
    client_body_timeout 15s;
    reset_timedout_connection on;
    limit_req_log_level warn;
    limit_conn_log_level warn;
    limit_conn_status 429;

    # Defined globally from the TCP peer address, before real-IP rewriting.
    if ($from_cloudflare_origin = 0) { return 403; }

    proxy_http_version 1.1;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Origin-Agent-Cluster "?1" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' https://image.tmdb.org data:; connect-src 'self'; font-src 'self'; object-src 'none'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    location = /api/import/tvtime {
        client_max_body_size 25M;
        limit_req zone=vazute_api burst=50 nodelay;
        limit_req zone=vazute_import burst=2 nodelay;
        limit_req_status 429;
        limit_conn vazute_api_conn 20;
        proxy_pass http://127.0.0.1:8090;
    }

    location = /api/users/me/avatar {
        client_max_body_size 4M;
        limit_req zone=vazute_api burst=50 nodelay;
        limit_req_status 429;
        limit_conn vazute_api_conn 20;
        proxy_pass http://127.0.0.1:8090;
    }

    location /api/auth/ {
        limit_req zone=vazute_api burst=50 nodelay;
        limit_req zone=vazute_auth burst=10 nodelay;
        limit_req_status 429;
        limit_conn vazute_api_conn 20;
        proxy_pass http://127.0.0.1:8090;
    }

    location /api/img/ {
        limit_req zone=vazute_assets burst=100 nodelay;
        limit_req_status 429;
        limit_conn vazute_api_conn 20;
        proxy_pass http://127.0.0.1:8090;
    }

    location /api/assets/ {
        limit_req zone=vazute_assets burst=100 nodelay;
        limit_req_status 429;
        limit_conn vazute_api_conn 20;
        proxy_pass http://127.0.0.1:8090;
    }

    location = /api/media/search {
        limit_req zone=vazute_api burst=50 nodelay;
        limit_req zone=vazute_search burst=10 nodelay;
        limit_req_status 429;
        limit_conn vazute_api_conn 20;
        proxy_pass http://127.0.0.1:8090;
    }

    location /api/ {
        limit_req zone=vazute_api burst=50 nodelay;
        limit_req_status 429;
        limit_conn vazute_api_conn 20;
        proxy_pass http://127.0.0.1:8090;
    }

    location / {
        proxy_pass http://127.0.0.1:8091;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    include snippets/robots.conf;
    ssl_certificate /etc/letsencrypt/live/vazute.micutu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vazute.micutu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    include snippets/block-dotfiles.conf;
    server_name vazute.micutu.com;
    listen 80;
    listen [::]:80;
    return 301 https://$host$request_uri;
}
