version: 2
updates:
  # Backend Rust crates
  - package-ecosystem: cargo
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Frontend npm packages
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Same blocker as /mobile: TypeScript 7 is the native rewrite, and
      # @typescript-eslint's typescript-estree reads internals it dropped, so
      # eslint dies before parsing a file. tsc itself is fine — it is the lint
      # toolchain that cannot follow yet. Lift when typescript-eslint supports it.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major

  # Native mobile npm packages
  - package-ecosystem: npm
    directory: /mobile
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    groups:
      mobile-npm-minor-patch:
        update-types:
          - minor
          - patch
    # The Expo SDK dictates the version of every native module it manages, and
    # `npx expo install --check` rejects anything else. Bumping these one at a
    # time still passes CI, which never runs a native build, so the breakage
    # only shows up on a device. They move as a set on an SDK upgrade, via
    # `npx expo install --fix`.
    ignore:
      - dependency-name: expo
      - dependency-name: expo-*
      - dependency-name: react
      - dependency-name: react-native
      - dependency-name: react-native-gesture-handler
      - dependency-name: react-native-safe-area-context
      - dependency-name: react-native-screens
      - dependency-name: react-native-svg
      - dependency-name: "@react-native-async-storage/*"
      - dependency-name: "@react-native-community/*"
      # eslint-config-expo still bundles eslint-plugin-react, whose newest
      # release peers on eslint ^9.7 and calls the context.getFilename() API
      # that eslint 10 removed. Lift once Expo ships an eslint 10 config.
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      # TypeScript 7 (the native port) breaks @typescript-eslint's
      # typescript-estree, which reads internals the rewrite dropped, so lint
      # dies before it parses a file. Lift once typescript-eslint supports it.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      # jest-expo pins the jest 29 line through its own dependencies, so a
      # jest 30 runner meets jest-mock 29 and every suite dies on
      # `clearMocksOnScope is not a function`. @types/jest follows the runtime.
      # Lift when jest-expo moves to jest 30.
      - dependency-name: jest
        update-types:
          - version-update:semver-major
      - dependency-name: "@types/jest"
        update-types:
          - version-update:semver-major

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7

  # Base images for the container builds
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: docker
    directory: /frontend
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    # A Postgres major cannot be rolled out by swapping the image tag: the
    # server refuses to start on a data directory written by an older major,
    # and production holds a live volume. That upgrade is a deliberate
    # dump/restore, never an automated bump.
    ignore:
      - dependency-name: postgres
        update-types:
          - version-update:semver-major
