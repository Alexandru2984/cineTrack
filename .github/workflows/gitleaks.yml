name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so secrets in older commits are caught too.
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:v8.30.1 \
            detect --source /repo --redact --verbose --exit-code 1
