name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "27 4 * * 1"

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so secrets in older commits are caught too.
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        env:
          REPOSITORY_WORKSPACE: ${{ github.workspace }}
        run: |
          docker run --rm -v "$REPOSITORY_WORKSPACE:/repo:ro" \
            zricethezav/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source /repo --redact --verbose --exit-code 1
