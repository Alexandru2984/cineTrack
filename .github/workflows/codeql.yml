name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "27 3 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze JS/TS
    runs-on: ubuntu-latest
    permissions:
      actions: read # Read workflow metadata for CodeQL analysis.
      contents: read # Checkout and analyze repository contents.
      security-events: write # Upload CodeQL results to code scanning.
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3.37.0
        with:
          languages: javascript-typescript
          # The frontend is the only JS/TS surface; scope analysis to it.
          source-root: frontend

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:javascript-typescript"
