name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  # Keep in step with the rust tag in backend/Dockerfile.{dev,prod}: CI installs
  # its own toolchain, so bumping only the image leaves this behind and the
  # build fails on crates that raised their minimum rustc.
  RUST_TOOLCHAIN: 1.96.0

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Check the toolchain matches the container images
        run: |
          # RUST_TOOLCHAIN and the Dockerfile tags are separate knobs, so bumping
          # one alone gets caught here rather than as a compile error deep in the
          # dependency graph.
          expected="${RUST_TOOLCHAIN%.*}"
          for file in Dockerfile.dev Dockerfile.prod; do
            found=$(grep -oP '(?<=^FROM rust:)[0-9]+\.[0-9]+' "$file")
            if [ "$found" != "$expected" ]; then
              echo "::error file=backend/$file::$file uses rust $found but RUST_TOOLCHAIN is $RUST_TOOLCHAIN"
              exit 1
            fi
          done
          echo "backend images and RUST_TOOLCHAIN agree on rust $expected"

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt,clippy
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  integration:
    name: Backend Integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: cinetrack_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d cinetrack_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend

      - name: Integration tests
        env:
          TEST_DATABASE_URL: postgres://test_user:test_pass@localhost:5433/cinetrack_test
        run: cargo test --test api_tests -- --ignored --test-threads=1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Audit production dependencies
        run: npm audit --omit=dev

  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Validate Expo project
        run: npm run doctor

      - name: Audit high and critical vulnerabilities
        run: npm audit --audit-level=high

      - name: Export Android bundle
        run: npm run export:android

      - name: Validate OTA profile configuration
        run: |
          EAS_BUILD_PROFILE=production EXPO_UPDATES_ENABLED=true \
            npx expo config --type public --json > /tmp/vazute-production-config.json
          node -e 'const c=require("/tmp/vazute-production-config.json"); if(c.updates?.enabled !== false) process.exit(1)'
          EAS_BUILD_PROFILE=preview EXPO_UPDATES_ENABLED=true \
            npx expo config --type public --json > /tmp/vazute-preview-config.json
          node -e 'const c=require("/tmp/vazute-preview-config.json"); if(c.updates?.enabled !== true) process.exit(1)'

      - name: Prebuild production native projects
        env:
          EAS_BUILD_PROFILE: production
          EXPO_UPDATES_ENABLED: "false"
          EXPO_USE_DEV_CLIENT: "0"
        run: npx expo prebuild --platform all --no-install --clean

      - name: Install Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0
            ndk;27.1.12297006

      - name: Validate generated native security config
        run: python3 scripts/validate_native_config.py

      - name: Compile Android release
        working-directory: mobile/android
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

  operations:
    name: Operations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate GitHub Actions workflows
        run: |
          docker run --rm --volume "$PWD:$PWD:ro" --workdir "$PWD" \
            rhysd/actionlint:1.7.7@sha256:1d74bfc9fd1963af8f89a7c22afaaafd42f49aad711a09951d02cb996398f61d \
            -color

      - name: ShellCheck operational scripts
        run: |
          docker run --rm --volume "$PWD:$PWD:ro" --workdir "$PWD" \
            koalaman/shellcheck:v0.10.0@sha256:0fa384f2a6171aef8aab2999a531c8c8158727d54a8f20157a5c3c51a734d6b2 \
            --external-sources scripts/*.sh scripts/tests/*.sh bench/*.sh bench/db/*.sh

      - name: Validate embedded Python
        run: |
          python3 scripts/tests/check_embedded_python.py \
            scripts/backup_to_r2.sh scripts/restore_from_r2.sh

      - name: Backup and restore safety tests
        run: scripts/tests/backup_restore_test.sh

      - name: Validate Prometheus alert rules
        run: |
          docker run --rm --volume "$PWD:/repo:ro" --entrypoint promtool \
            prom/prometheus:v3.6.0@sha256:d9a702d3f7f398540e7190c4d80dbb8a0dc95c1e481e8ebd8a08e5bcf83cf735 \
            check rules /repo/ops/prometheus/cinetrack-alerts.yml

  e2e:
    name: Frontend E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: PWA install and offline tests
        run: npm run test:e2e:pwa

  e2e-realstack:
    name: Frontend E2E (real stack)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: cinetrack_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d cinetrack_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend

      - name: Install Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests (real backend + Postgres)
        run: npm run test:e2e:realstack
        env:
          E2E_DATABASE_URL: postgres://test_user:test_pass@localhost:5432/cinetrack_test

  rust-audit:
    name: Rust Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"

      - name: Cache Rust
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: backend

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Audit dependencies
        # RUSTSEC-2023-0071 is reported through sqlx-mysql metadata in Cargo.lock,
        # but this backend builds sqlx with only the postgres feature enabled.
        run: cargo audit --ignore RUSTSEC-2023-0071

  container-security:
    name: Container Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build production images
        run: |
          docker build --tag cinetrack-backend:ci --file backend/Dockerfile.prod backend
          docker build --tag cinetrack-frontend:ci --file frontend/Dockerfile.prod frontend

      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: cinetrack-backend:ci
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          skip-setup-trivy: true
          image-ref: cinetrack-frontend:ci
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "1"

      - name: Scan deployment configuration
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          skip-setup-trivy: true
          scan-type: config
          scan-ref: .
          scanners: misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
